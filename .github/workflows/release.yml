on:
  push: {}
  pull_request: {}

name: Release

jobs:
  build:
    runs-on: namespace-profile-ghostty-sm

    env:
      ZIG_LOCAL_CACHE_DIR: /zig/local-cache
      ZIG_GLOBAL_CACHE_DIR: /zig/global-cache

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1.4.2
        with:
          path: |
            /nix
            /zig

      - name: Install Nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: nix develop -c zig build gh-release -Ddate=$(date +%Y-%m-%d) -Drun-number=${{ github.run_number }} -Drun-attempt=${{ github.run_attempt }}
